<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IICT Student Information System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #f3f0fa;
            --bg-sidebar: #fbfaff;
            --primary-purple: #7b4fc3;
            --primary-light: #f0e6ff;
            --text-dark: #3a2a56;
            --text-muted: #8c7fa6;
            --border-color: #e2daf5;
            --card-bg: #ffffff;
            --btn-update: #9b6be6;
            --btn-delete: #ef5350;
            --btn-clear: #90a4ae;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            flex: 1;
        }

        .header-banner {
            background: linear-gradient(135deg, #ffffff 0%, var(--primary-light) 100%);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            margin: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(123, 79, 195, 0.05);
        }

        .header-banner h1 {
            font-size: 1.2rem;
            color: var(--primary-purple);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .header-banner p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 0 12px;
            margin-bottom: 15px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-icon {
            background-color: var(--primary-light);
            color: var(--primary-purple);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .stat-icon svg {
            width: 18px;
            height: 18px;
            fill: var(--primary-purple);
        }

        .stat-info h3 {
            font-size: 1.1rem;
            color: var(--text-dark);
            font-weight: 600;
        }

        .stat-info p {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 500;
        }

        .main-content {
            padding: 0 12px 15px 12px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 4px 12px rgba(123, 79, 195, 0.03);
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--primary-purple);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid var(--bg-main);
            padding-bottom: 8px;
        }

        .card-title svg {
            width: 16px;
            height: 16px;
            fill: var(--primary-purple);
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 4px;
            color: var(--text-dark);
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.85rem;
            background-color: var(--bg-sidebar);
            color: var(--text-dark);
            outline: none;
        }

        .form-status {
            background-color: var(--primary-light);
            color: var(--primary-purple);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-status svg {
            width: 14px;
            height: 14px;
            fill: var(--primary-purple);
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .btn {
            padding: 11px;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .btn svg {
            width: 14px;
            height: 14px;
            fill: white;
        }

        .btn-add { background-color: var(--primary-purple); }
        .btn-update { background-color: var(--btn-update); }
        .btn-delete { background-color: var(--btn-delete); }
        .btn-clear { background-color: var(--btn-clear); }

        .search-container {
            position: relative;
            margin-bottom: 12px;
        }

        .search-container svg {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            fill: var(--text-muted);
        }

        .records-list {
            max-height: 280px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .record-item {
            border: 1px solid var(--border-color);
            background-color: var(--bg-sidebar);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .record-item.selected {
            background-color: var(--primary-light);
            border-color: var(--primary-purple);
        }

        .record-details {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .record-avatar {
            width: 32px;
            height: 32px;
            background-color: var(--border-color);
            color: var(--primary-purple);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .record-info h4 {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .record-info p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .badge-year {
            background-color: var(--primary-light);
            color: var(--primary-purple);
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
            margin-top: 2px;
            display: inline-block;
        }

        .record-actions {
            display: flex;
            gap: 5px;
        }

        .btn-mini {
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-mini svg {
            width: 12px;
            height: 12px;
        }

        .btn-mini-edit svg { fill: var(--primary-purple); }
        .btn-mini-delete svg { fill: var(--btn-delete); }

        .no-data {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-style: italic;
        }

        .footer-banner {
            background-color: var(--primary-purple);
            color: white;
            text-align: center;
            padding: 8px;
            font-size: 0.7rem;
            font-weight: 500;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="header-banner">
            <h1>IICT STUDENT INFORMATION SYSTEM</h1>
            <p>Celebrating the 48th Founding Anniversary</p>
            <p style="font-size: 0.65rem; font-weight: 600; color: var(--primary-purple);">Isabela State University</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><svg viewBox="0 0 640 512"><path d="M144 160c-44.2 0-80-35.8-80-80s35.8-80 80-80 80 35.8 80 80-35.8 80-80 80zm352 0c-44.2 0-80-35.8-80-80s35.8-80 80-80 80 35.8 80 80-35.8 80-80 80zm-16 64h-64c-11 0-21.2 3.1-30 8.3 24.1 20 40 49.7 40 83.7 0 11.2-1.9 21.9-5.2 32h59.2c17.7 0 32-14.3 32-32v-32c0-35.3-28.7-64-64-64zm-192 0c-35.3 0-64 28.7-64 64v32c0 17.7 14.3 32 32 32h59.2c-3.3-10.1-5.2-20.8-5.2-32 0-34 15.9-63.7 40-83.7-8.8-5.2-19-8.3-30-8.3zm128 32c-53 0-96-43-96-96s43-96 96-96 96 43 96 96-43 96-96 96zm96 96c0-53-43-96-96-96s-96 43-96 96v48c0 26.5 21.5 48 48 48h96c26.5 0 48-21.5 48-48v-48z"/></svg></div>
                <div class="stat-info"><h3 id="count-total">0</h3><p>Total</p></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><svg viewBox="0 0 448 512"><path d="M224 256c70.7 0 128-57.3 128-128S294.7 0 224 0 96 57.3 96 128s57.3 128 128 128zm89.6 32h-16.7c-22.2 10.2-46.9 16-72.9 16s-50.6-5.8-72.9-16h-16.7C34.3 288 0 322.3 0 364.8V464c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48v-99.2c0-42.5-34.3-76.8-74.4-76.8z"/></svg></div>
                <div class="stat-info"><h3 id="count-y1">0</h3><p>Year 1</p></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><svg viewBox="0 0 448 512"><path d="M224 256c70.7 0 128-57.3 128-128S294.7 0 224 0 96 57.3 96 128s57.3 128 128 128zm89.6 32h-16.7c-22.2 10.2-46.9 16-72.9 16s-50.6-5.8-72.9-16h-16.7C34.3 288 0 322.3 0 364.8V464c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48v-99.2c0-42.5-34.3-76.8-74.4-76.8z"/></svg></div>
                <div class="stat-info"><h3 id="count-y2">0</h3><p>Year 2</p></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><svg viewBox="0 0 448 512"><path d="M224 256c70.7 0 128-57.3 128-128S294.7 0 224 0 96 57.3 96 128s57.3 128 128 128zm89.6 32h-16.7c-22.2 10.2-46.9 16-72.9 16s-50.6-5.8-72.9-16h-16.7C34.3 288 0 322.3 0 364.8V464c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48v-99.2c0-42.5-34.3-76.8-74.4-76.8z"/></svg></div>
                <div class="stat-info"><h3 id="count-y3">0</h3><p>Year 3</p></div>
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <div class="card-title">
                    <svg viewBox="0 0 512 512"><path d="M256 512c141.4 0 256-114.6 256-256S397.4 0 256 0 0 114.6 0 256s114.6 256 256 256zm116-292h-84v-84c0-11-9-20-20-20h-24c-11 0-20 9-20 20v84h-84c-11 0-20 9-20 20v24c0 11 9 20 20 20h84v84c0 11 9 20 20 20h24c11 0 20-9 20-20v84h84c11 0 20-9 20-20v-24c0-11-9-20-20-20z"/></svg>
                    ADD / EDIT STUDENT
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="student-id">Student ID</label>
                        <input type="text" id="student-id" placeholder="Enter ID">
                    </div>
                    <div class="form-group">
                        <label for="year-level">Year Level</label>
                        <select id="year-level">
                            <option value="">Select Year</option>
                            <option value="Year Level 1">Year Level 1</option>
                            <option value="Year Level 2">Year Level 2</option>
                            <option value="Year Level 3">Year Level 3</option>
                            <option value="Year Level 4">Year Level 4</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="student-name">Student Name</label>
                    <input type="text" id="student-name" placeholder="Enter Full Name">
                </div>

                <div class="form-status" id="status-message">
                    <svg viewBox="0 0 512 512"><path d="M256 8C119.043 8 8 119.083 8 256c0 136.997 111.043 248 248 248s248-111.003 248-248C504 119.083 392.957 8 256 8zm0 110c23.196 0 42 18.804 42 42s-18.804 42-42 42-42-18.804-42-42 18.804-42 42-42zm56 254c0 6.627-5.373 12-12 12h-88c-6.627 0-12-5.373-12-12v-24c0-6.627 5.373-12 12-12h12v-64h-12c-6.627 0-12-5.373-12-12v-24c0-6.627 5.373-12 12-12h64c6.627 0 12 5.373 12 12v100h12c6.627 0 12 5.373 12 12v24z"/></svg>
                    Fill in all fields to manage students.
                </div>

                <div class="btn-grid">
                    <button class="btn btn-add" id="btn-add">Add</button>
                    <button class="btn btn-update" id="btn-update">Update</button>
                    <button class="btn btn-delete" id="btn-delete">Delete</button>
                    <button class="btn btn-clear" id="btn-clear">Clear</button>
                </div>
            </div>

            <div class="card">
                <div class="card-title">
                    <svg viewBox="0 0 448 512"><path d="M448 73.143v45.714C448 159.143 347.667 192 224 192S0 159.143 0 118.857V73.143C0 32.857 100.333 0 224 0s224 32.857 224 73.143zM448 176v102.857C448 319.143 347.667 352 224 352S0 319.143 0 278.857V176c48.125 33.143 136.208 48.571 224 48.571S399.875 209.143 448 176zm0 160v102.857C448 479.143 347.667 512 224 512S0 479.143 0 438.857V336c48.125 33.143 136.208 48.571 224 48.571S399.875 369.143 448 336z"/></svg>
                    STUDENT RECORDS
                </div>
                
                <div class="search-container">
                    <input type="text" id="search-bar" placeholder="Search by ID or Name...">
                    <svg viewBox="0 0 512 512"><path d="M505 442.7L405.3 343c-4.5-4.5-10.6-7-17-7H372c27.6-35.3 44-79.7 44-128C416 93.1 322.9 0 208 0S0 93.1 0 208s93.1 208 208 208c48.3 0 92.7-16.4 128-44v16.3c0 6.4 2.5 12.5 7 17l99.7 99.7c9.4 9.4 24.6 9.4 33.9 0l28.3-28.3c9.4-9.4 9.4-24.6.1-34zM208 336c-70.7 0-128-57.3-128-128s57.3-128 128-128 128 57.3 128 128-57.3 128-128 128z"/></svg>
                </div>

                <div class="records-list" id="records-container"></div>
            </div>
        </div>

        <div class="footer-banner">
            Building IT Excellence. Developing Future Innovators. &copy; 2026 IICT SIS
        </div>
    </div>

    <script>
        // METHOD 2: Using App Inventor Runtime Bridge
        let studentsArray = [
            { id: "20260001", name: "Juan Dela Cruz", year: "Year Level 1" },
            { id: "20260002", name: "Maria Santos", year: "Year Level 2" },
            { id: "20260003", name: "John Paul Reyes", year: "Year Level 3" }
        ];

        let targetSelectedId = null;

        const inputId = document.getElementById('student-id');
        const inputName = document.getElementById('student-name');
        const inputYear = document.getElementById('year-level');
        const searchBar = document.getElementById('search-bar');
        const containerRecords = document.getElementById('records-container');
        const statusBox = document.getElementById('status-message');

        const countTotal = document.getElementById('count-total');
        const countY1 = document.getElementById('count-y1');
        const countY2 = document.getElementById('count-y2');
        const countY3 = document.getElementById('count-y3');

        // Broadcast to MIT App Inventor TinyDB
        function syncDatabase() {
            renderRecords(searchBar.value.trim());
            calculateMetrics();

            // Native safety handshake link to MIT App Inventor Block Architecture
            if (window.AppInventor && window.AppInventor.setWebViewString) {
                window.AppInventor.setWebViewString(JSON.stringify(studentsArray));
            }
        }

        // Catch incoming database snapshots sent from MIT App Inventor TinyDB on application startup
        window.loadNativeData = function(jsonDataString) {
            if (jsonDataString) {
                try {
                    studentsArray = JSON.parse(jsonDataString);
                    renderRecords();
                    calculateMetrics();
                    pushStatus("Synchronized data with device storage.");
                } catch (e) {
                    console.log("Failed parsing native dataset context.");
                }
            }
        };

        function calculateMetrics() {
            countTotal.innerText = studentsArray.length;
            countY1.innerText = studentsArray.filter(s => s.year === "Year Level 1").length;
            countY2.innerText = studentsArray.filter(s => s.year === "Year Level 2").length;
            countY3.innerText = studentsArray.filter(s => s.year === "Year Level 3").length;
        }

        function pushStatus(text, isAction = false) {
            statusBox.innerHTML = `★ ${text}`;
        }

        function clearForm() {
            inputId.value = "";
            inputName.value = "";
            inputYear.value = "";
            targetSelectedId = null;
            inputId.disabled = false;
            
            const activeRows = document.querySelectorAll('.record-item');
            activeRows.forEach(row => row.classList.remove('selected'));
            
            pushStatus("Form fields cleared.");
        }

        function renderRecords(filterText = "") {
            containerRecords.innerHTML = "";
            const matches = studentsArray.filter(student => {
                const query = filterText.toLowerCase();
                return student.id.toLowerCase().includes(query) || student.name.toLowerCase().includes(query);
            });

            if (matches.length === 0) {
                containerRecords.innerHTML = `<div class="no-data">No matching records located.</div>`;
                return;
            }

            matches.forEach((student, index) => {
                const itemRow = document.createElement('div');
                itemRow.className = `record-item ${targetSelectedId === student.id ? 'selected' : ''}`;
                
                itemRow.innerHTML = `
                    <div class="record-details">
                        <div class="record-avatar">${index + 1}</div>
                        <div class="record-info">
                            <h4>${student.name}</h4>
                            <p>ID: ${student.id}</p>
                            <span class="badge-year">${student.year}</span>
                        </div>
                    </div>
                    <div class="record-actions">
                        <button class="btn-mini btn-mini-edit" onclick="setupEdit('${student.id}')">Edit</button>
                        <button class="btn-mini btn-mini-delete" onclick="triggerDirectDelete('${student.id}')">Delete</button>
                    </div>
                `;
                containerRecords.appendChild(itemRow);
            });
        }

        window.setupEdit = function(id) {
            const student = studentsArray.find(s => s.id === id);
            if (student) {
                targetSelectedId = student.id;
                inputId.value = student.id;
                inputId.disabled = true;
                inputName.value = student.name;
                inputYear.value = student.year;
                pushStatus(`Loaded profile: ${student.name}`);
                renderRecords(searchBar.value.trim());
            }
        };

        window.triggerDirectDelete = function(id) {
            studentsArray = studentsArray.filter(s => s.id !== id);
            if(targetSelectedId === id) clearForm();
            pushStatus("Student record removed.", true);
            syncDatabase();
        };

        document.getElementById('btn-add').addEventListener('click', () => {
            const idValue = inputId.value.trim();
            const nameValue = inputName.value.trim();
            const yearValue = inputYear.value;

            if (!idValue || !nameValue || !yearValue) {
                pushStatus("Error: All fields must contain values.");
                return;
            }

            if (studentsArray.some(s => s.id === idValue)) {
                pushStatus("Clash: Student ID already exists.");
                return;
            }

            studentsArray.push({ id: idValue, name: nameValue, year: yearValue });
            pushStatus(`Added: ${nameValue}`, true);
            clearForm();
            syncDatabase();
        });

        document.getElementById('btn-update').addEventListener('click', () => {
            if (!targetSelectedId) {
                pushStatus("Denied: Choose a record via 'Edit' first.");
                return;
            }

            const nameValue = inputName.value.trim();
            const yearValue = inputYear.value;

            if (!nameValue || !yearValue) {
                pushStatus("Error: Fields cannot be empty.");
                return;
            }

            const targetIndex = studentsArray.findIndex(s => s.id === targetSelectedId);
            if (targetIndex !== -1) {
                studentsArray[targetIndex].name = nameValue;
                studentsArray[targetIndex].year = yearValue;
                pushStatus(`Updated: ${nameValue}`, true);
                clearForm();
                syncDatabase();
            }
        });

        document.getElementById('btn-delete').addEventListener('click', () => {
            if (!targetSelectedId) {
                pushStatus("Denied: Select a student row to delete.");
                return;
            }
            triggerDirectDelete(targetSelectedId);
        });

        document.getElementById('btn-clear').addEventListener('click', clearForm);
        
        searchBar.addEventListener('input', (e) => {
            renderRecords(e.target.value.trim());
        });

        // Initialize execution on load
        calculateMetrics();
        renderRecords();
    </script>
</body>
</html>
