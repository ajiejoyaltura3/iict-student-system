<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IICT Student System</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root {
            --primary-purple: #7b2cbf;
            --dark-purple: #5a189a;
            --light-bg: #f3e5f5;
            --card-bg: #ffffff;
            --text-color: #333333;
            --btn-gray: #9e9e9e;
            --btn-red: #b05a6a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header, .container, footer {
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        .header-brand {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .tech-logo {
            font-size: 2.5rem;
            color: var(--primary-purple);
        }

        .header-title h2 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--dark-purple);
            letter-spacing: 1px;
        }

        .header-title p {
            margin: 2px 0 0 0;
            font-size: 0.85rem;
            color: #666;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--dark-purple);
            font-size: 1rem;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            color: var(--primary-purple);
            font-size: 1.1rem;
        }

        .input-wrapper input, .input-wrapper select {
            width: 100%;
            padding: 12px 12px 12px 38px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #f9f9f9;
            font-size: 0.95rem;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .input-wrapper input:focus, .input-wrapper select:focus {
            border-color: var(--primary-purple);
            background-color: #fff;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
            color: white;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-save { background-color: #8a4fca; }
        .btn-update { background-color: #9d2cb3; }
        .btn-delete { background-color: var(--btn-red); }
        .btn-clear { background-color: var(--btn-gray); }

        /* Search Layout */
        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .search-wrapper i {
            position: absolute;
            left: 12px;
            color: #aaa;
        }

        .search-wrapper input {
            width: 100%;
            padding: 10px 10px 10px 35px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            background-color: #f5f5f5;
            box-sizing: border-box;
        }

        /* Table Components */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th {
            background-color: #8a4fca;
            color: white;
            padding: 10px;
            font-weight: 500;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .act-btn {
            background: none;
            border: none;
            color: var(--primary-purple);
            cursor: pointer;
            font-size: 1.1rem;
        }

        .act-btn-delete {
            color: var(--btn-red);
        }

        footer {
            text-align: center;
            font-size: 0.75rem;
            color: #777;
            padding: 15px 0;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-brand">
            <i class='bx bx-hive tech-logo'></i> 
            <div class="header-title">
                <h2>IICT STUDENT SYSTEM</h2>
                <p>Dept. of Information & Communications Technology</p>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <div class="card-title">
                <i class='bx bx-user-pin'></i> Student Information
            </div>

            <div class="input-group">
                <label>Student ID</label>
                <div class="input-wrapper">
                    <i class='bx bx-id-card'></i>
                    <input type="text" id="studentId" placeholder="Enter Student ID">
                </div>
            </div>

            <div class="input-group">
                <label>Student Name</label>
                <div class="input-wrapper">
                    <i class='bx bx-user'></i>
                    <input type="text" id="studentName" placeholder="Enter Student Name">
                </div>
            </div>

            <div class="input-group">
                <label>Year Level</label>
                <div class="input-wrapper">
                    <i class='bx bx-layer'></i>
                    <select id="yearLevel">
                        <option value="">Select Year Level</option>
                        <option value="1st Year">1st Year</option>
                        <option value="2nd Year">2nd Year</option>
                        <option value="3rd Year">3rd Year</option>
                        <option value="4th Year">4th Year</option>
                    </select>
                </div>
            </div>

            <div class="button-grid">
                <button class="btn btn-save" onclick="saveData()"><i class='bx bx-plus-circle'></i> Save</button>
                <button class="btn btn-update" onclick="updateData()"><i class='bx bx-edit-alt'></i> Update</button>
                <button class="btn btn-delete" onclick="deleteData()"><i class='bx bx-trash'></i> Delete</button>
                <button class="btn btn-clear" onclick="clearInputs()"><i class='bx bx-refresh'></i> Clear</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                <i class='bx bx-list-ul'></i> Student Records
            </div>
            
            <div class="search-wrapper">
                <i class='bx bx-search'></i>
                <input type="text" id="searchField" placeholder="Search student..." onkeyup="filterTable()">
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Student ID</th>
                            <th>Student Name</th>
                            <th>Year Level</th>
                            <th style="text-align: center;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer>
        <div>
            <i class='bx bx-git-branch'></i> © 2026 IICT Dept. Student Info. System <br>
            All rights reserved. Lab Activity 4 Wrapper
        </div>
    </footer>

    <script>
        // Memory-based Array storage configuration
        let students = [
            { id: "240551", name: "Ajie Joy Altura", year: "2nd Year" },
            { id: "2024001", name: "Juan Dela Cruz", year: "1st Year" },
            { id: "2024002", name: "Maria Santos", year: "2nd Year" }
        ];

        // Core compilation table component injector
        function renderTable() {
            const tbody = document.getElementById("studentTableBody");
            tbody.innerHTML = "";

            students.forEach((student, index) => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${student.id}</td>
                    <td>${student.name}</td>
                    <td>${student.year}</td>
                    <td style="text-align: center;">
                        <div class="action-btns" style="justify-content: center;">
                            <button class="act-btn" onclick="selectRow('${student.id}', '${student.name.replace(/'/g, "\\'")}', '${student.year}')"><i class='bx bx-edit'></i></button>
                            <button class="act-btn act-btn-delete" onclick="directDelete('${student.id}')"><i class='bx bx-trash'></i></button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // Active layout focus mapping selection system
        function selectRow(id, name, year) {
            document.getElementById("studentId").value = id;
            document.getElementById("studentName").value = name;
            document.getElementById("yearLevel").value = year;
            document.getElementById("studentId").disabled = true; 
        }

        // Create operation
        function saveData() {
            const id = document.getElementById("studentId").value.trim();
            const name = document.getElementById("studentName").value.trim();
            const year = document.getElementById("yearLevel").value;

            if (!id || !name || !year) {
                alert("Please fill up all information fields correctly.");
                return;
            }
            
            if (students.some(s => s.id === id)) {
                alert("Student ID already exists! Use UPDATE instead.");
                return;
            }

            students.push({ id, name, year });
            renderTable();
            clearInputs();
        }

        // Update operation
        function updateData() {
            const id = document.getElementById("studentId").value.trim();
            const name = document.getElementById("studentName").value.trim();
            const year = document.getElementById("yearLevel").value;

            if (!id || !name || !year) {
                alert("Select a record sequence row to modify first.");
                return;
            }

            const targetIndex = students.findIndex(s => s.id === id);

            if (targetIndex !== -1) {
                students[targetIndex].name = name;
                students[targetIndex].year = year;
                renderTable();
                clearInputs();
                alert("Record structural elements updated successfully.");
            }
        }

        // Form Delete connection proxy redirection
        function deleteData() {
            const id = document.getElementById("studentId").value.trim();
            if (!id) {
                alert("Input target identity ID value sequence to remove
