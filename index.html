<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IICT Student Information System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #f3f0fa;
            --bg-sidebar: #fbfaff;
            --primary-purple: #7b4fc3;
            --primary-light: #f0e6ff;
            --text-dark: #3a2a56;
            --text-muted: #8c7fa6;
            --border-color: #e2daf5;
            --card-bg: #ffffff;
            --btn-update: #9b6be6;
            --btn-delete: #ef5350;
            --btn-clear: #90a4ae;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Responsive Layout for Mobile WebViewer */
        .wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            flex: 1;
        }

        /* Top Header Banner */
        .header-banner {
            background: linear-gradient(135deg, #ffffff 0%, var(--primary-light) 100%);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            margin: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(123, 79, 195, 0.05);
            position: relative;
        }

        .header-banner h1 {
            font-size: 1.3rem;
            color: var(--primary-purple);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .header-banner p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 3px;
        }

        /* Dashboard Counter Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 0 12px;
            margin-bottom: 15px;
        }

        @media (min-width: 600px) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-icon {
            background-color: var(--primary-light);
            color: var(--primary-purple);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1rem;
        }

        .stat-info h3 {
            font-size: 1.1rem;
            color: var(--text-dark);
            font-weight: 600;
        }

        .stat-info p {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 500;
        }

        /* Main Content Workspace */
        .main-content {
            padding: 0 12px 15px 12px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 4px 12px rgba(123, 79, 195, 0.03);
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--primary-purple);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid var(--bg-main);
            padding-bottom: 8px;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 12px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 4px;
            color: var(--text-dark);
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.85rem;
            background-color: var(--bg-sidebar);
            color: var(--text-dark);
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--primary-purple);
        }

        /* Status Toast Message inside Form */
        .form-status {
            background-color: var(--primary-light);
            color: var(--primary-purple);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Action Buttons Grid */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn-add { background-color: var(--primary-purple); }
        .btn-update { background-color: var(--btn-update); }
        .btn-delete { background-color: var(--btn-delete); }
        .btn-clear { background-color: var(--btn-clear); }

        /* Records Viewer Section */
        .search-container {
            position: relative;
            margin-bottom: 12px;
        }

        .search-container input {
            padding-right: 35px;
        }

        .search-container i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .records-list {
            max-height: 280px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .record-item {
            border: 1px solid var(--border-color);
            background-color: var(--bg-sidebar);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s;
        }

        .record-item.selected {
            background-color: var(--primary-light);
            border-color: var(--primary-purple);
        }

        .record-details {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .record-avatar {
            width: 32px;
            height: 32px;
            background-color: var(--border-color);
            color: var(--primary-purple);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .record-info h4 {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .record-info p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .badge-year {
            background-color: var(--primary-light);
            color: var(--primary-purple);
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
            margin-top: 2px;
            display: inline-block;
        }

        .record-actions {
            display: flex;
            gap: 5px;
        }

        .btn-mini {
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            color: var(--text-dark);
        }

        .btn-mini-edit:hover {
            color: var(--primary-purple);
            border-color: var(--primary-purple);
        }

        .btn-mini-delete:hover {
            color: var(--btn-delete);
            border-color: var(--btn-delete);
        }

        .no-data {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-style: italic;
        }

        /* Bottom Status Footer Bar */
        .footer-banner {
            background-color: var(--primary-purple);
            color: white;
            text-align: center;
            padding: 8px;
            font-size: 0.7rem;
            font-weight: 500;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="header-banner">
            <h1>IICT STUDENT INFORMATION SYSTEM</h1>
            <p>Celebrating the 48th Founding Anniversary</p>
            <p style="font-size: 0.65rem; font-weight: 600; color: var(--primary-purple);">Isabela State University</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid ref fa-users"></i></div>
                <div class="stat-info"><h3 id="count-total">0</h3><p>Total</p></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-user-grad"></i></div>
                <div class="stat-info"><h3 id="count-y1">0</h3><p>Year 1</p></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-user-grad"></i></div>
                <div class="stat-info"><h3 id="count-y2">0</h3><p>Year 2</p></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-user-grad"></i></div>
                <div class="stat-info"><h3 id="count-y3">0</h3><p>Year 3</p></div>
            </div>
        </div>

        <div class="main-content">
            
            <div class="card">
                <div class="card-title"><i class="fa-solid fa-user-plus"></i> ADD / EDIT STUDENT</div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="student-id">Student ID</label>
                        <input type="text" id="student-id" placeholder="Enter ID">
                    </div>
                    <div class="form-group">
                        <label for="year-level">Year Level</label>
                        <select id="year-level">
                            <option value="">Select Year</option>
                            <option value="Year Level 1">Year Level 1</option>
                            <option value="Year Level 2">Year Level 2</option>
                            <option value="Year Level 3">Year Level 3</option>
                            <option value="Year Level 4">Year Level 4</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="student-name">Student Name</label>
                    <input type="text" id="student-name" placeholder="Enter Full Name">
                </div>

                <div class="form-status" id="status-message">
                    <i class="fa-solid fa-circle-info"></i> Fill in all fields to manage students.
                </div>

                <div class="btn-grid">
                    <button class="btn btn-add" id="btn-add"><i class="fa-solid fa-plus"></i> Add</button>
                    <button class="btn btn-update" id="btn-update"><i class="fa-solid fa-pen-to-square"></i> Update</button>
                    <button class="btn btn-delete" id="btn-delete"><i class="fa-solid fa-trash-can"></i> Delete</button>
                    <button class="btn btn-clear" id="btn-clear"><i class="fa-solid fa-broom"></i> Clear</button>
                </div>
            </div>

            <div class="card">
                <div class="card-title"><i class="fa-solid fa-database"></i> STUDENT RECORDS</div>
                
                <div class="search-container">
                    <input type="text" id="search-bar" placeholder="Search by ID or Name...">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>

                <div class="records-list" id="records-container">
                    </div>
            </div>

        </div>

        <div class="footer-banner">
            Building IT Excellence. Developing Future Innovators. &copy; 2026 IICT SIS
        </div>
    </div>

    <script>
        // Memory Array for Database Simulation (Pre-populated with your mock data)
        let studentsArray = JSON.parse(localStorage.getItem('iict_students')) || [
            { id: "20260001", name: "Juan Dela Cruz", year: "Year Level 1" },
            { id: "20260002", name: "Maria Santos", year: "Year Level 2" },
            { id: "20260003", name: "John Paul Reyes", year: "Year Level 3" }
        ];

        let targetSelectedId = null;

        // DOM Element Cache Pointers
        const inputId = document.getElementById('student-id');
        const inputName = document.getElementById('student-name');
        const inputYear = document.getElementById('year-level');
        const searchBar = document.getElementById('search-bar');
        const containerRecords = document.getElementById('records-container');
        const statusBox = document.getElementById('status-message');

        // Counters Dom Nodes
        const countTotal = document.getElementById('count-total');
        const countY1 = document.getElementById('count-y1');
        const countY2 = document.getElementById('count-y2');
        const countY3 = document.getElementById('count-y3');

        // Synchronize and render database engine UI components
        function syncDatabase() {
            localStorage.setItem('iict_students', JSON.stringify(studentsArray));
            renderRecords(searchBar.value.trim());
            calculateMetrics();
        }

        function calculateMetrics() {
            countTotal.innerText = studentsArray.length;
            countY1.innerText = studentsArray.filter(s => s.year === "Year Level 1").length;
            countY2.innerText = studentsArray.filter(s => s.year === "Year Level 2").length;
            countY3.innerText = studentsArray.filter(s => s.year === "Year Level 3").length;
        }

        function pushStatus(text, isAction = false) {
            statusBox.innerHTML = `<i class="fa-solid ${isAction ? 'fa-square-check' : 'fa-circle-info'}"></i> ${text}`;
        }

        function clearForm() {
            inputId.value = "";
            inputName.value = "";
            inputYear.value = "";
            targetSelectedId = null;
            inputId.disabled = false;
            
            const activeRows = document.querySelectorAll('.record-item');
            activeRows.forEach(row => row.classList.remove('selected'));
            
            pushStatus("Form fields cleared.");
        }

        // Render dataset onto layout DOM structure
        function renderRecords(filterText = "") {
            containerRecords.innerHTML = "";
            const matches = studentsArray.filter(student => {
                const query = filterText.toLowerCase();
                return student.id.toLowerCase().includes(query) || student.name.toLowerCase().includes(query);
            });

            if (matches.length === 0) {
                containerRecords.innerHTML = `<div class="no-data">No matching records located.</div>`;
                return;
            }

            matches.forEach((student, index) => {
                const itemRow = document.createElement('div');
                itemRow.className = `record-item ${targetSelectedId === student.id ? 'selected' : ''}`;
                
                itemRow.innerHTML = `
                    <div class="record-details">
                        <div class="record-avatar">${index + 1}</div>
                        <div class="record-info">
                            <h4>${student.name}</h4>
                            <p>ID: ${student.id}</p>
                            <span class="badge-year">${student.year}</span>
                        </div>
                    </div>
                    <div class="record-actions">
                        <button class="btn-mini btn-mini-edit" onclick="setupEdit('${student.id}')"><i class="fa-solid fa-pen"></i> Edit</button>
                        <button class="btn-mini btn-mini-delete" onclick="triggerDirectDelete('${student.id}')"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
                containerRecords.appendChild(itemRow);
            });
        }

        // Click Handler for Table Action Triggers
        window.setupEdit = function(id) {
            const student = studentsArray.find(s => s.id === id);
            if (student) {
                targetSelectedId = student.id;
                inputId.value = student.id;
                inputId.disabled = true; // Lock identity access key from runtime modification mutations
                inputName.value = student.name;
                inputYear.value = student.year;
                pushStatus(`Loaded student profiles: ${student.name}`);
                renderRecords(searchBar.value.trim());
            }
        };

        window.triggerDirectDelete = function(id) {
            studentsArray = studentsArray.filter(s => s.id !== id);
            if(targetSelectedId === id) clearForm();
            pushStatus("Target student record removed successfully.", true);
            syncDatabase();
        };

        // Standard Operation Button Action Bindings
        document.getElementById('btn-add').addEventListener('click', () => {
            const idValue = inputId.value.trim();
            const nameValue = inputName.value.trim();
            const yearValue = inputYear.value;

            if (!idValue || !nameValue || !yearValue) {
                pushStatus("Error: All fields must contain values before processing.");
                return;
            }

            if (studentsArray.some(s => s.id === idValue)) {
                pushStatus("Identity clash: Student reference number already exists.");
                return;
            }

            studentsArray.push({ id: idValue, name: nameValue, year: yearValue });
            pushStatus(`Added: ${nameValue}`, true);
            clearForm();
            syncDatabase();
        });

        document.getElementById('btn-update').addEventListener('click', () => {
            if (!targetSelectedId) {
                pushStatus("Operation Denied: Choose a listing record via 'Edit' before attempting updates.");
                return;
            }

            const nameValue = inputName.value.trim();
            const yearValue = inputYear.value;

            if (!nameValue || !yearValue) {
                pushStatus("Update Error: Input field parameters cannot be empty.");
                return;
            }

            const targetIndex = studentsArray.findIndex(s => s.id === targetSelectedId);
            if (targetIndex !== -1) {
                studentsArray[targetIndex].name = nameValue;
                studentsArray[targetIndex].year = yearValue;
                pushStatus(`Record update confirmed for: ${nameValue}`, true);
                clearForm();
                syncDatabase();
            }
        });

        document.getElementById('btn-delete').addEventListener('click', () => {
            if (!targetSelectedId) {
                pushStatus("Operation Denied: Select a data row target to perform deletion.");
                return;
            }
            triggerDirectDelete(targetSelectedId);
        });

        document.getElementById('btn-clear').addEventListener('click', clearForm);
        
        searchBar.addEventListener('input', (e) => {
            renderRecords(e.target.value.trim());
        });

        // Initialize First UI Paint Frame
        syncDatabase();
    </script>
</body>
</html>
